<h1>Silence éternel</h1>
<p>Vous retenez votre souffle, immobile dans l’obscurité.

    Les créatures passent, si proches que vous pouvez entendre leurs mâchoires claquer dans le vide.
    
    Puis… le silence revient.
    
    Pour l’instant, vous êtes encore en vie.</p>
