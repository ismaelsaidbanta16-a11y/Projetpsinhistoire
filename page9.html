<h1>La grange</h1>
<p>La grange grince en s’ouvrant, révélant un intérieur sombre mais intact.

    Vous y trouvez des fusils, des munitions… et des traces de lutte.
    
    Quelqu’un s’est défendu ici.
    
    Et peut-être a survécu.</p>
