<h1>Abri fragile</h1>
<p>Vous improvisez un abri avec ce que vous trouvez : branches, toile déchirée, restes d’équipement.

    La nuit tombe rapidement, enveloppant la forêt d’une obscurité totale.
    
    Puis viennent les sons.
    
    Des pas traînants. Des respirations rauques.
    
    Ils sont proches.</p>
